<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veri Kayıt Sistemi</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h2 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
        }
        input:focus { outline: 2px solid var(--primary); }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .error { color: #ef4444; font-size: 0.8rem; margin-top: 0.3rem; display: none; }
        #jsonDisplay {
            margin-top: 2rem;
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kayıt Paneli</h2>
    <form id="dataForm">
        <div class="form-group">
            <label>Ad Soyad</label>
            <input type="text" id="name" placeholder="Örn: Cihan ...">
            <div id="nameError" class="error">İsim alanı boş bırakılamaz.</div>
        </div>

        <div class="form-group">
            <label>T.C. Kimlik No</label>
            <input type="text" id="tc" maxlength="11" placeholder="11 Haneli TC">
            <div id="tcError" class="error">TC 11 haneli ve sadece rakam olmalıdır.</div>
        </div>

        <div class="form-group">
            <label>Yaş</label>
            <input type="number" id="age" placeholder="Yaşınız">
            <div id="ageError" class="error">Lütfen geçerli bir yaş girin (0-120).</div>
        </div>

        <button type="submit">JSON Olarak Kaydet</button>
    </form>

    <div id="jsonDisplay">// Kayıtlı veriler burada görünecek...</div>
</div>

<script src="script.js"></script>
</body>
</html>
